<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles/main.css" />
</head>
<header>
    <div class="banner contain">
        <span><a>Login</a> or <a>Register</a> | TODAY'S DATE</span>

            <span><a>Whishlist</a> | <a>Stores</a> | <a>My Account</a></span>

        </div>
    </div>
    </div>
    <nav class="navbar contain">
        <div class="nav-main">
            <button class="nav-brand"><img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Sony_Interactive_Entertainment_logo_%282016%29.svg" alt="logo" class="brand-image"></button>
            <button class="nav-button">Home</button>

            <button class="nav-button">Blog</button>

        <div>
            <button class="icon-button"><img src="https://upload.wikimedia.org/wikipedia/commons/3/33/Codex_icon_search.svg" alt="search-icon" class="nav-icon"></button>
            <button class="icon-button"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Cart_%28CoreUI_Icons_v1.0.0%29.svg" alt="search-icon" class="nav-icon"></button>
        </div>
    </nav>
</header>

<body>
    <section>
        <div class="poster contain">
            <div class="poster-content">
                <div>
                    <p class="sup-text">We represent</p>
                    <p class="main-text">San José Street Style</p>
                </div>
                <button class="shop-button">Shop now</button>
            </div>
            <div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/97/Swallow-tailed_bee-eater_%28Merops_hirundineus_chrysolaimus%29.jpg" alt="model" class="poster-image">
            </div>
        </div>
    </section>
    <main class="catalog contain">
        <div>
            <div class="title-container">
                <p class="main-title">Trending</p>
                <p class="sub-title">Most Trendy Clothes</p>
            </div>

        </div>
        <div class="product-rows">
            <div class="product">
                <div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Rubber_Duck_%2833539138686%29.jpg" alt="giant-ducky" class="product-image">
                </div>
                <div class="product-info">
                    <div class="main-row"><span class="info-name">Giant Ducky</span> <button class="add-button">+</button></div>
                    <span>Duckies</span>
                    <span class="price">$475</span>
                </div>
            </div>
            <div class="product">
                <div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/96/Pirate_and_ninja_rubber_duckies_%281399329821%29.jpg" alt="3-duckies" class="product-image">
                </div>
                <div class="product-info">
                    <div class="main-row"><span class="info-name">3 Duckies</span> <button class="add-button">+</button></div>
                    <span>Duckies</span>
                    <span class="price">$475</span>
                </div>
            </div>
            <div class="product">
                <div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/dd/Pato_de_goma.jpg" alt="bat-ducky" class="product-image">
                </div>
                <div class="product-info">
                    <div class="main-row"><span class="info-name">Bat Ducky</span> <button class="add-button">+</button></div>
                    <span>Duckies</span>
                    <span class="price">$475</span>
                </div>
            </div>
            <div class="product">
                <div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Rubber_Ducky_%285628618625%29.jpg" alt="cool-ducky" class="product-image">
                </div>
                <div class="product-info">
                    <div class="main-row"><span class="info-name">Cool Ducky</span> <button class="add-button">+</button></div>
                    <span>Duckies</span>
                    <span class="price">$475</span>
