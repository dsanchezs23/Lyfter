<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="ecommerce.css" />
    <title>Fruits</title>
</head>
<header>
    </div>
    <nav class="navbar-contain">
        <div class="main-nav">
            <div class="nav-main">
                <button class="nav-brand"><img
                        src="https://upload.wikimedia.org/wikipedia/commons/c/c6/Apple_cartoon_with_transparent_background.png"
                        alt="logo" class="brand-image"></button>
                <button class="nav-button">Home</button>
                <button class="nav-button">Shop</button>
                <button class="nav-button">Pages</button>
                <button class="nav-button">Blog</button>
                <button class="nav-button">Shortcodes</button>
                <button class="nav-button">Buy Now</button>
            </div>
            <div>
                <button class="icon-button"><img
                        src="https://upload.wikimedia.org/wikipedia/commons/3/33/Codex_icon_search.svg"
                        alt="search-icon" class="nav-icon"></button>
                <button class="icon-button"><img
                        src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Cart_%28CoreUI_Icons_v1.0.0%29.svg"
                        alt="search-icon" class="nav-icon"></button>
            </div>
        </div>
    </nav>
</header>

<body>
    <section>
        <div class="poster">
            <div class="poster-content">
                <div>
                    <p class="sup-text">We represent</p>
                    <p class="main-text">Alajuela Street Style</p>
                </div>
                <button class="shop-button">Shop now</button>
            </div>
            <div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/ManggaBaru.png" alt="model"
                    class="poster-image">
            </div>
        </div>
    </section>
    <main class="catalog">
        <div class="product-rows">
            <div class="product" id="Classics">
                <div>
                    Classics
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Apple_icon_1.png" alt="model"
                        class="product-image">
                </div>
            </div>
            <div class="product" id="Best">
                <div>
                    Best Sellers
                </div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fd/Grape_icon.png" alt="model"
                    class="product-image">
            </div>

            <div class="product" id="Exotic">
                <div>
                    Exotic Fruits
                </div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/88/Piece_of_watermelon.png" alt="model"
                    class="product-image">
            </div>
        </div>

        <div class="products-columns">
            <div class="product-rows-second">
                <div class="product-second">
                    <div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Watermelone1.png" alt="watermelon"
                            class="product-image">
                    </div>
                    <div class="product-info">
                        <div class="main-row"><span class="info-name">Watermelon</span> <button
                                class="add-button">+</button></div>
                        <span>Fruits</span>
                        <span class="price">$4.75</span>
                    </div>
                </div>
                <div class="product-second">
                    <div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/bb/NanasBaru.png" alt="pineapple"
                            class="product-image">
                    </div>
                    <div class="product-info">
                        <div class="main-row"><span class="info-name">Pineapple</span> <button
                                class="add-button">+</button></div>
                        <span>Fruits</span>
                        <span class="price">$4.75</span>
                    </div>
                </div>
                <div class="product-second">
                    <div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/7/70/PisangBaru.png" alt="banana"
                            class="product-image">
                    </div>
                    <div class="product-info">
                        <div class="main-row"><span class="info-name">Banana</span> <button
                                class="add-button">+</button></div>
                        <span>Fruits</span>
                        <span class="price">$2.90</span>
                    </div>
                </div>
            </div>
            <div class="product-rows-second">
                <div class="product-second">
                    <div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/Pears.png" alt="pear"
                            class="product-image">
                    </div>
                    <div class="product-info">
                        <div class="main-row"><span class="info-name">Pear</span> <button class="add-button">+</button>
                        </div>
                        <span>Fruits</span>
                        <span class="price">$4.75</span>
                    </div>
                </div>
                <div class="product-second">
                    <div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d8/Tomato-cut_vertical.png"
                            alt="tomato" class="product-image">
                    </div>
                    <div class="product-info">
                        <div class="main-row"><span class="info-name">Tomato</span> <button
                                class="add-button">+</button></div>
                        <span>Fruits</span>
                        <span class="price">$2.75</span>
                    </div>
                </div>
                <div class="product-second">
                    <div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/Two_strawberries.png"
                            alt="strawberries" class="product-image">
                    </div>
                    <div class="product-info">
                        <div class="main-row"><span class="info-name">Strawberries</span> <button
                                class="add-button">+</button></div>
                        <span>Fruits</span>
                        <span class="price">$4.75</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <section>
        <div class="poster-second">
            <form action="POST">
                <div class="stay-connected">
                    <p class="sup-text"> Stay in touch with us!</p>
                    <input type="text">
                    <button type="submit" class="send-button">Send</button>
            </form>
        </div>
    </section>
</body>

</html>
