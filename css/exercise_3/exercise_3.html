<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billboard Hot 100 Clone</title>
    <link rel="stylesheet" href="exercise_3.css">
</head>
<body>

<div class="chart-container">
    <header class="chart-header">
        <h1>Billboard Hot 100™</h1>
        <p class="date">Week of February 14, 2026</p>
    </header>

    <div class="chart-list">
        <div class="chart-row">
            <div class="rank-container">
                <span class="rank">1</span>
                <span class="rank-status status-up">▲</span>
            </div>
            <div class="song-info">
                <img src="https://charts-static.billboard.com/img/2025/11/ellalangley-gaq-choosintexas-3s2-180x180.jpg" alt="Cover Art" class="album-art">
                <div class="details">
                    <h3 class="song-title">Choosin' Texas</h3>
                    <p class="artist-name">Ella Langley</p>
                </div>
            </div>
            <div class="stats">
                <div class="stat-col"><small>LAST WEEK</small> 2</div>
                <div class="stat-col"><small>PEAK POS.</small> 1</div>
                <div class="stat-col"><small>WKS ON CHART</small> 16</div>
            </div>
        </div>

        <div class="chart-row">
            <div class="rank-container">
                <span class="rank">2</span>
                <span class="rank-status status-down">▼</span>
            </div>
            <div class="song-info">
                <img src="https://charts-static.billboard.com/img/2025/08/oliviadean-lxn-manineed-jej-180x180.jpg" alt="Cover Art" class="album-art">
                <div class="details">
                    <h3 class="song-title">Man I Needd</h3>
                    <p class="artist-name">Olivia Dean</p>
                </div>
            </div>
            <div class="stats">
                <div class="stat-col"><small>LAST WEEK</small> 3</div>
                <div class="stat-col"><small>PEAK POS.</small> 2</div>
                <div class="stat-col"><small>WKS ON CHART</small> 24</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
