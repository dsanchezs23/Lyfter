<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Input Display</title>
    <link rel="stylesheet" href="exercise_2.css">
</head>

<body>
    <h1>Text Display</h1>
    <input type="text" id="textInput" placeholder="Enter some text">
    <button onclick="displayText()">Submit</button>

    <div id="output"></div>

    <script>
        function displayText() {
            const inputValue = document.getElementById('textInput').value;
            document.getElementById('output').textContent = inputValue;
            document.getElementById('textInput').value = '';
        }
    </script>
</body>

</html>
