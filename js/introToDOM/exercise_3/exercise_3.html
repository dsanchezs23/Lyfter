<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="exercise_3.css">
</head>

<body>
    <h1>Registration Form</h1>
    <form>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div>
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" required>
        </div>

        <div>
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" required>
        </div>

        <div>
            <label>Are you an employee?</label>
            <div class="radio-group">
                <label><input type="radio" name="employee" value="yes" id="employeeYes"> Yes</label>
                <label><input type="radio" name="employee" value="no" id="employeeNo"> No</label>
            </div>
        </div>

        <div id="employmentInput">
            <label for="employment">Employment Type:</label>
            <input type="text" id="employment" name="employment">
        </div>

        <button type="submit">Submit</button>
    </form>

    <script>
        const employeeYes = document.getElementById('employeeYes');
        const employeeNo = document.getElementById('employeeNo');
        const employmentInput = document.getElementById('employmentInput');

        employeeYes.addEventListener('change', () => {
            employmentInput.style.display = 'block';
        });

        employeeNo.addEventListener('change', () => {
            employmentInput.style.display = 'none';
        });
    </script>
</body>

</html>
