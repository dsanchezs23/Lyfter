<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Security - API Manager</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <h2>Change Password</h2>
        <form id="passwordForm">
            <input type="text" id="userId" placeholder="Confirm your User ID" required>
            <input type="password" id="oldPass" placeholder="Current Password" required>
            <input type="password" id="newPass" placeholder="New Password" required>
            <input type="password" id="confirmPass" placeholder="Confirm New Password" required>
            <button type="submit">Update Password</button>
            <button type="button" class="btn-secondary" onclick="location.href='profile.html'">Back to Profile</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="password.js"></script>
</body>

</html>
