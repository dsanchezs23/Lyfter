<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <h2>Create Account</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="text" id="address" placeholder="Address" required>
            <button type="submit">Create User</button>
            <button type="button" class="btn-secondary" onclick="location.href='index.html'">Back to Home</button>
        </form>
        <div class="nav-links">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <div id="idModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>User Created Successfully!</h3>
            <p>Please save your unique ID. You will need it to login.</p>
            <div class="id-display">
                <code id="newUserId"></code>
            </div>
            <button id="copyIdBtn">Copy ID & Continue</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="register.js"></script>
</body>

</html>
