<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — PawStore</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
</head>
<body>
  <header id="site-header" class="site-header"></header>

  <main>
    <section class="page-section auth-section">
      <div class="container">
        <div class="auth-card card">
          <div class="card__body">
            <h1 class="auth-card__title">Iniciar sesión</h1>
            <div class="banner banner-error" id="form-banner" role="alert" hidden></div>
            <form class="form" id="login-form" novalidate>
              <div class="form-field">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="nombre.apellido@ejemplo.com" autocomplete="email" />
                <span class="field-error" data-for="email"></span>
              </div>
              <div class="form-field">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" autocomplete="current-password" />
                <span class="field-error" data-for="password"></span>
              </div>
              <button class="btn btn-primary btn-block" type="submit">Ingresar</button>
            </form>
            <p class="auth-card__footer">
              <a href="register.html">Crear una cuenta</a> &middot; <a href="index.html">Volver al inicio</a>
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script type="module" src="js/pages/login.page.js"></script>
</body>
</html>
