<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — PawStore</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
</head>
<body>
  <header id="site-header" class="site-header"></header>

  <main>
    <section class="page-section auth-section">
      <div class="container">
        <div class="auth-card card auth-card--wide">
          <div class="card__body">
            <h1 class="auth-card__title">Crear cuenta</h1>
            <div class="banner banner-error" id="form-banner" role="alert" hidden></div>
            <form class="form" id="register-form" novalidate>
              <div class="form-grid">
                <div class="form-field">
                  <label for="name">Nombre</label>
                  <input type="text" id="name" name="name" placeholder="Introduce tu nombre" autocomplete="given-name" />
                  <span class="field-error" data-for="name"></span>
                </div>
                <div class="form-field">
                  <label for="lastName">Apellido</label>
                  <input type="text" id="lastName" name="lastName" placeholder="Introduce tu apellido" autocomplete="family-name" />
                  <span class="field-error" data-for="lastName"></span>
                </div>
              </div>

              <div class="form-field">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@dominio.com" autocomplete="email" />
                <span class="field-error" data-for="email"></span>
              </div>

              <div class="form-grid">
                <div class="form-field">
                  <label for="password">Contraseña</label>
                  <input type="password" id="password" name="password" placeholder="Introduce tu contraseña" autocomplete="new-password" />
                  <span class="field-error" data-for="password"></span>
                </div>
                <div class="form-field">
                  <label for="confirmPassword">Confirmar contraseña</label>
                  <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirma tu contraseña" autocomplete="new-password" />
                  <span class="field-error" data-for="confirmPassword"></span>
                </div>
              </div>

              <div class="form-grid">
                <div class="form-field">
                  <label for="phoneNumber">Teléfono</label>
                  <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="88887777" autocomplete="tel" />
                  <span class="field-error" data-for="phoneNumber"></span>
                </div>
                <div class="form-field">
                  <label for="birthday">Fecha de nacimiento</label>
                  <input type="date" id="birthday" name="birthday" />
                  <span class="field-error" data-for="birthday"></span>
                </div>
              </div>

              <div class="form-field">
                <label for="shippingAddress">Dirección de envío</label>
                <input type="text" id="shippingAddress" name="shippingAddress" placeholder="Provincia, cantón, dirección exacta" autocomplete="street-address" />
                <span class="field-error" data-for="shippingAddress"></span>
              </div>

              <button class="btn btn-primary btn-block" type="submit">Registrarse</button>
            </form>
            <p class="auth-card__footer">
              <a href="login.html">Ya tengo una cuenta</a>
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script type="module" src="js/pages/register.page.js"></script>
</body>
</html>
